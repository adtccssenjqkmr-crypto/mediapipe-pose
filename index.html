<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Pose Detector</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0e15">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css?v=6">
</head>
<body>
    <script>
        // App.js読み込み失敗や構文エラーなども即座に画面に表示するインラインデバッガ
        window.addEventListener("error", (event) => {
            const status = document.getElementById("loading-status");
            if (status) {
                status.style.color = "#ff4a4a";
                status.innerText = `エラー: ${event.message}\nファイル: ${event.filename}:${event.lineno}`;
            }
        });
        window.addEventListener("unhandledrejection", (event) => {
            const status = document.getElementById("loading-status");
            if (status) {
                status.style.color = "#ff4a4a";
                status.innerText = `非同期エラー: ${event.reason}`;
            }
        });
    </script>
    <!-- App Loading Screen -->
    <div id="loading-screen" class="active">
        <div class="loader-content">
            <div class="glow-orb"></div>
            <div class="spinner"></div>
            <h1>AI Pose Detector</h1>
            <p id="loading-status">AIモデルを読み込んでいます...</p>
        </div>
    </div>

    <!-- Main Application Container -->
    <main class="app-container">
        <!-- Header -->
        <header class="app-header">
            <span class="logo-text">POSE<span class="highlight">.AI</span></span>
            <div class="status-indicator">
                <span class="pulse-dot active" id="status-dot"></span>
                <span id="fps-counter">-- FPS</span>
            </div>
        </header>

        <!-- Real-time HUD info overlay (Moved outside viewport for better usability) -->
        <div class="hud-overlay">
            <div class="hud-card" id="pose-status-card">
                <span class="hud-label">検出状態</span>
                <span class="hud-value" id="pose-detected">未検出</span>
            </div>
            <div class="hud-card" id="angle-card">
                <span class="hud-label">角度計測</span>
                <select id="joint-select" class="hud-select">
                    <optgroup label="肘・膝・手・足 (屈曲/伸展)">
                        <option value="elbow_flexion">肘関節 (屈曲/伸展)</option>
                        <option value="knee_flexion">膝関節 (屈曲/伸展)</option>
                        <option value="wrist_flexion">手関節 (屈曲/伸展)</option>
                        <option value="ankle_flexion">足関節 (底屈/背屈)</option>
                    </optgroup>
                    <optgroup label="肩関節">
                        <option value="shoulder_flexion">肩関節 (屈曲/伸展)</option>
                        <option value="shoulder_abduction">肩関節 (内転/外転)</option>
                        <option value="shoulder_rotation">肩関節 (内旋/外旋)</option>
                    </optgroup>
                    <optgroup label="股関節">
                        <option value="hip_flexion">股関節 (屈曲/伸展)</option>
                        <option value="hip_abduction">股関節 (内転/外転)</option>
                        <option value="hip_rotation">股関節 (内旋/外旋)</option>
                    </optgroup>
                </select>
                <div class="angle-display-row">
                    <div class="angle-val-box">左: <span id="left-angle-val">--°</span></div>
                    <div class="angle-val-box">右: <span id="right-angle-val">--°</span></div>
                </div>
            </div>
        </div>

        <!-- Camera Viewport -->
        <section class="viewport-section">
            <div class="video-wrapper">
                <input type="file" id="video-file-input" accept="video/*" style="display: none;">
                <video id="webcam" autoplay playsinline muted></video>
                <canvas id="output_canvas"></canvas>
            </div>
        </section>

        <!-- Control Panel (Glassmorphism) -->
        <footer class="control-panel">
            <div class="control-row">
                <button id="toggle-btn" class="panel-btn primary-btn">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg>
                    <span>カメラ開始</span>
                </button>
                
                <button id="switch-camera-btn" class="panel-btn secondary-btn" disabled>
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 4v6h-6"></path>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                    </svg>
                    <span>カメラ切替</span>
                </button>
            </div>
            
            <div class="control-row">
                <button id="upload-video-btn" class="panel-btn secondary-btn">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <span>動画を解析</span>
                </button>
            </div>
            
            <div class="info-row">
                <p>全身が映るように撮影または動画選択を行ってください。</p>
            </div>
        </footer>
    </main>

    <!-- Core App Logic -->
    <script type="module" src="app.js?v=6"></script>
    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js?v=6')
                    .then(reg => console.log('Service Worker registered.', reg))
                    .catch(err => console.error('Service Worker registration failed.', err));
            });
        }
    </script>
</body>
</html>
