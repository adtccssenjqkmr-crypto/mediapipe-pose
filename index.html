<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Pose Detector</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0e15">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Chart.js for time-series joint angle visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css?v=9">
</head>
<body>
    <script>
        // App.js読み込み失敗や構文エラーなども即座に画面に表示するインラインデバッガ
        window.addEventListener("error", (event) => {
            const status = document.getElementById("loading-status");
            if (status) {
                status.style.color = "#ff4a4a";
                status.innerText = `エラー: ${event.message}\nファイル: ${event.filename}:${event.lineno}`;
            }
        });
        window.addEventListener("unhandledrejection", (event) => {
            const status = document.getElementById("loading-status");
            if (status) {
                status.style.color = "#ff4a4a";
                status.innerText = `非同期エラー: ${event.reason}`;
            }
        });
    </script>
    <!-- App Loading Screen -->
    <div id="loading-screen" class="active">
        <div class="loader-content">
            <div class="glow-orb"></div>
            <div class="spinner"></div>
            <h1>AI Pose Detector</h1>
            <p id="loading-status">AIモデルを読み込んでいます...</p>
        </div>
    </div>

    <!-- Main Application Container -->
    <main class="app-container">
        <!-- Header -->
        <header class="app-header">
            <span class="logo-text">POSE<span class="highlight">.AI</span></span>
            <div class="status-indicator">
                <span class="pulse-dot active" id="status-dot"></span>
                <span id="fps-counter">-- FPS</span>
            </div>
        </header>

        <!-- Camera Viewport -->
        <section class="viewport-section">
            <div class="video-wrapper">
                <input type="file" id="video-file-input" accept="video/*" style="display: none;">
                <input type="file" id="image-file-input" accept="image/*" style="display: none;">
                <video id="webcam" autoplay playsinline muted></video>
                <canvas id="output_canvas"></canvas>
            </div>
            
            <!-- Real-time HUD info overlay (Compact floating bar overlaying video) -->
            <div class="hud-overlay">
                <div class="hud-bar-item status-box">
                    <span id="pose-detected">未検出</span>
                </div>
                <div class="hud-bar-item select-box">
                    <select id="joint-select" class="hud-select-compact">
                        <optgroup label="肘・膝・手・足 (屈曲/伸展)">
                            <option value="elbow_flexion">肘関節 (屈曲/伸展)</option>
                            <option value="knee_flexion">膝関節 (屈曲/伸展)</option>
                            <option value="wrist_flexion">手関節 (屈曲/伸展)</option>
                            <option value="ankle_flexion">足関節 (底屈/背屈)</option>
                        </optgroup>
                        <optgroup label="肩関節">
                            <option value="shoulder_flexion">肩関節 (屈曲/伸展)</option>
                            <option value="shoulder_abduction">肩関節 (内転/外転)</option>
                            <option value="shoulder_rotation">肩関節 (内旋/外旋)</option>
                        </optgroup>
                        <optgroup label="股関節">
                            <option value="hip_flexion">股関節 (屈曲/伸展)</option>
                            <option value="hip_abduction">股関節 (内転/外転)</option>
                            <option value="hip_rotation">股関節 (内旋/外旋)</option>
                        </optgroup>
                    </select>
                </div>
                <div class="hud-bar-item value-box">
                    L: <span id="left-angle-val">--°</span>
                </div>
                <div class="hud-bar-item value-box">
                    R: <span id="right-angle-val">--°</span>
                </div>
            </div>
        </section>

        <!-- Control Panel (Glassmorphism) -->
        <footer class="control-panel">
            <div class="control-row">
                <button id="toggle-btn" class="panel-btn primary-btn">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg>
                    <span>カメラ開始</span>
                </button>
                
                <button id="switch-camera-btn" class="panel-btn secondary-btn" disabled>
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 4v6h-6"></path>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                    </svg>
                    <span>カメラ切替</span>
                </button>
            </div>
            
            <div class="control-row">
                <button id="record-btn" class="panel-btn record-btn" disabled style="flex: 1;">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <circle cx="12" cy="12" r="3" fill="currentColor" id="record-dot-icon"></circle>
                    </svg>
                    <span id="record-btn-text">録画開始</span>
                </button>
                <button id="skeleton-only-btn" class="panel-btn secondary-btn" style="flex: 1;">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                    <span>骨格のみ: OFF</span>
                </button>
            </div>
            
            <div class="control-row">
                <button id="upload-video-btn" class="panel-btn secondary-btn">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <span>動画を解析</span>
                </button>
                <button id="upload-image-btn" class="panel-btn secondary-btn">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                        <polyline points="21 15 16 10 5 21"></polyline>
                    </svg>
                    <span>画像を解析</span>
                </button>
            </div>

            <div class="control-row">
                <button id="show-chart-btn" class="panel-btn secondary-btn" disabled style="width: 100%;">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="20" x2="18" y2="10"></line>
                        <line x1="12" y1="20" x2="12" y2="4"></line>
                        <line x1="6" y1="20" x2="6" y2="14"></line>
                    </svg>
                    <span>解析グラフを表示</span>
                </button>
            </div>
            
            <div class="info-row">
                <p>カメラで「録画開始」するか、保存した動画・画像を読み込んで解析できます。</p>
            </div>
        </footer>
    </main>

    <!-- Chart Visualization Section -->
    <section id="chart-section" class="chart-section" style="display: none;">
        <div class="chart-card">
            <div class="chart-header">
                <span class="hud-label">時系列角度解析グラフ</span>
                <button id="close-chart-btn" class="close-btn">&times;</button>
            </div>
            <div class="chart-select-row">
                <div class="chart-select-box">
                    <label for="chart-select-1">グラフ 1 (実線)</label>
                    <select id="chart-select-1" class="hud-select-compact">
                        <option value="elbow_flexion">肘関節 (屈曲)</option>
                        <option value="knee_flexion" selected>膝関節 (屈曲)</option>
                        <option value="wrist_flexion">手関節 (屈曲)</option>
                        <option value="ankle_flexion">足関節 (底背屈)</option>
                        <option value="shoulder_flexion">肩関節 (屈曲/伸展)</option>
                        <option value="shoulder_abduction">肩関節 (内転/外転)</option>
                        <option value="shoulder_rotation">肩関節 (内旋/外旋)</option>
                        <option value="hip_flexion">股関節 (屈曲/伸展)</option>
                        <option value="hip_abduction">股関節 (内転/外転)</option>
                        <option value="hip_rotation">股関節 (内旋/外旋)</option>
                    </select>
                </div>
                <div class="chart-select-box">
                    <label for="chart-select-2">グラフ 2 (破線)</label>
                    <select id="chart-select-2" class="hud-select-compact">
                        <option value="none">表示なし</option>
                        <option value="elbow_flexion">肘関節 (屈曲)</option>
                        <option value="knee_flexion">膝関節 (屈曲)</option>
                        <option value="wrist_flexion">手関節 (屈曲)</option>
                        <option value="ankle_flexion">足関節 (底背屈)</option>
                        <option value="shoulder_flexion">肩関節 (屈曲/伸展)</option>
                        <option value="shoulder_abduction">肩関節 (内転/外転)</option>
                        <option value="shoulder_rotation">肩関節 (内旋/外旋)</option>
                        <option value="hip_flexion">股関節 (屈曲/伸展)</option>
                        <option value="hip_abduction">股関節 (内転/外転)</option>
                        <option value="hip_rotation">股関節 (内旋/外旋)</option>
                    </select>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="jointChart"></canvas>
            </div>
        </div>
    </section>

    <!-- Core App Logic -->
    <script type="module" src="app.js?v=9"></script>
    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js?v=9')
                    .then(reg => console.log('Service Worker registered.', reg))
                    .catch(err => console.error('Service Worker registration failed.', err));
            });
        }
    </script>
</body>
</html>
